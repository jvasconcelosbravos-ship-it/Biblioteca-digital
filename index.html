<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Digital</title>
</head>
<body>
    <h1>Biblioteca Digital</h1>
    <div id="books">
        <!-- Existing books -->
        <div class="book">
            <h2>Book Title 1</h2>
            <img src="path/to/image1.jpg" alt="Book Title 1">
            <p>Description of Book Title 1.</p>
            <button class="favorite-btn">Add to Favorites</button>
        </div>
        <div class="book">
            <h2>Book Title 2</h2>
            <img src="path/to/image2.jpg" alt="Book Title 2">
            <p>Description of Book Title 2.</p>
            <button class="favorite-btn">Add to Favorites</button>
        </div>
        <!-- Many more books -->
        <div class="book">
            <h2>New Book Title 3</h2>
            <img src="path/to/image3.jpg" alt="New Book Title 3">
            <p>Description of New Book Title 3.</p>
            <button class="favorite-btn">Add to Favorites</button>
        </div>
        <div class="book">
            <h2>New Book Title 4</h2>
            <img src="path/to/image4.jpg" alt="New Book Title 4">
            <p>Description of New Book Title 4.</p>
            <button class="favorite-btn">Add to Favorites</button>
        </div>
    </div>
    <script>
        document.querySelectorAll('.favorite-btn').forEach(button => {
            button.addEventListener('click', () => {
                button.classList.toggle('favorited');
                alert('Favorite status changed!');
            });
        });
    </script>
</body>
</html>
